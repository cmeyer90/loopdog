# Deploy entry: on merge, mark the item deploying. The actual deployment runs
# in YOUR CI through the project adapter's deploy command (see looper-deploy
# workflow template); the smoke loop promotes or fails it.
name: deploy
trigger:
  github_event: pull_request
  action: [closed]
  predicate: { merged: true }
transition: { from: merged, to: deploying }
expects: none
gates: { require_dor: false, require_ci: true, tier: core }
