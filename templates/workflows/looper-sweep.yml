# Looper reconcile sweep — thin caller scaffolded by `looper init` (task 0076).
# Keep the schedule aligned with `sweep.interval` in .looper/looper.yml.
name: looper-sweep
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # manual/debug tick

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  looper:
    uses: cmeyer90/loopdog/.github/workflows/reusable-sweep.yml@v0.1.0
    with:
      looper-version: 0.1.0
