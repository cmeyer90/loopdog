# Adapter-driven deploy + smoke + rollback (tasks 0046-0048) — runs in YOUR CI
# with YOUR deploy secrets (bring-your-own; looper bakes no cloud creds).
# Reports the `deploy`, `deploy-smoke`, and `rollback` checks the deploy-smoke
# and rollback loops gate on. Replace the run: lines with your project
# adapter's commands (`looper config validate` prints them) or keep the
# adapter_options.commands you configured.
name: looper-deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  statuses: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: deploy via the project adapter
        run: |
          echo "replace with your adapter deploy command, e.g.:"
          echo "  ./scripts/deploy.sh   (adapter_options.commands.deploy)"
          exit 0

  deploy-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: smoke/health checks against the deployed target
        run: |
          echo "replace with your smoke assertions, e.g. curl your health endpoint"
          exit 0

  rollback:
    # runs only when deploy or smoke failed — the rollback loop gates on it
    needs: [deploy, deploy-smoke]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: roll back via the project adapter
        run: |
          echo "replace with your adapter rollback command"
          exit 0
