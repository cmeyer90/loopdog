# Loopdog event trigger — thin caller scaffolded by `loopdog init` (task 0008).
# The `on:` types are PINNED to loopdog's canonical event/action matrix; new
# GitHub actions are ignored until loopdog intentionally extends the matrix.
# Logic lives in loopdog's versioned reusable workflow — update by bumping the
# ref below, never by editing logic here.
name: loopdog-events
on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled]
  issue_comment:
    types: [created, edited]
  pull_request:
    types:
      [
        opened,
        reopened,
        synchronize,
        ready_for_review,
        converted_to_draft,
        labeled,
        unlabeled,
        closed,
      ]
  pull_request_review:
    types: [submitted, edited, dismissed]
  check_run:
    types: [completed, rerequested]
  check_suite:
    types: [completed]
  status:
  workflow_run:
    workflows: ['ci'] # your required CI workflow name(s)
    types: [completed]
  label:
    types: [created, edited, deleted]

# Must grant at least what the reusable workflow declares — a called workflow
# requesting more than the caller provides is a startup failure.
permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: read

jobs:
  loopdog:
    # Floating major tag: the release pipeline moves `@v0` to the latest 0.x on
    # every publish, so this always resolves and picks up fixes. For a fully
    # reproducible pin, swap to an exact tag (e.g. `@v0.3.0`).
    uses: cmeyer90/loopdog/.github/workflows/reusable-events.yml@v0
    with:
      loopdog-version: '0' # latest 0.x of @loopdog/cli (tracks the @v0 workflow)
    # Forward the provider secrets the controller needs to dispatch in `act`
    # mode. Unset secrets pass through as empty — dry-run/suggest loops and the
    # deterministic triage loop never read them. Stored by `loopdog connect`.
    secrets:
      claude_fire_url: ${{ secrets.LOOPDOG_CLAUDE_FIRE_URL }}
      claude_fire_token: ${{ secrets.LOOPDOG_CLAUDE_FIRE_TOKEN }}
      codex_mention_token: ${{ secrets.LOOPDOG_CODEX_MENTION_TOKEN }}
      # Optional: set the LOOPDOG_PAT secret (`loopdog connect cascade`) to make
      # loop→loop handoffs instant instead of waiting for the cron sweep. Unset
      # is fine — handoffs then run at sweep pace (today's default).
      loopdog_pat: ${{ secrets.LOOPDOG_PAT }}
