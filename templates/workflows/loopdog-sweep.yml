# Loopdog reconcile sweep — thin caller scaffolded by `loopdog init` (task 0076).
# Keep the schedule aligned with `sweep.interval` in .loopdog/loopdog.yml.
name: loopdog-sweep
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # manual/debug tick

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  loopdog:
    uses: cmeyer90/loopdog/.github/workflows/reusable-sweep.yml@v0.1.0
    with:
      loopdog-version: 0.1.0
