# Implementation: claim a ready issue, dispatch the work cell, ingest its PR.
name: implement
trigger:
  github_event: issues
  action: [labeled]
transition: { from: ready-for-agent, to: in-review }
expects: pull-request
gates: { require_dor: true, require_ci: true, tier: default }
blast_radius: { max_files: 20 }
