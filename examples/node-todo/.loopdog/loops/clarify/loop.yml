# Clarification (event-driven, never polled): a human reply re-grooms the
# issue with the answer in context.
name: clarify
trigger:
  github_event: issue_comment
  action: [created]
transition: { from: needs-clarification, to: ready-for-agent, fallback: needs-clarification }
expects: plan-update
gates: { require_dor: false, require_ci: false, tier: safe }
