# Grooming: raw issue -> Definition-of-Ready + durable plan + plan-as-contract.
# Bias to assume-and-proceed; genuinely ambiguous work lands on the fallback.
name: groom
trigger:
  github_event: issues
  action: [labeled, edited]
transition: { from: needs-grooming, to: ready-for-agent, fallback: needs-clarification }
expects: plan-update
gates: { require_dor: false, require_ci: false, tier: safe } # grooming CREATES the DoR
