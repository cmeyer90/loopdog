# Loopdog's reusable EVENT workflow (task 0008). Adopters reference this from
# the thin caller `loopdog init` scaffolds — they never copy the logic.
#
# GitHub Actions IS the webhook receiver: the caller's `on:` block (pinned to
# the canonical event/action matrix) delivers events natively; this workflow
# runs the deterministic controller for the one affected item under the
# adopter's own GITHUB_TOKEN. Controller-written changes do not re-trigger
# events — the sweep (reusable-sweep.yml) carries those handoffs.
name: loopdog-reusable-events
on:
  workflow_call:
    inputs:
      loopdog-version:
        description: '@loopdog/cli version to run'
        type: string
        default: latest

# Least-privilege manifest (task 0029). NOT granted: actions, packages,
# deployments, id-token, security-events. Deploy/OIDC loops opt in per-workflow.
permissions:
  contents: write # plan store + telemetry writes via the contents API
  issues: write # labels = state, claims, comments
  pull-requests: write # ingest/label/comment on PRs
  checks: read # CI verdicts for the gates

jobs:
  controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: run loopdog controller (event)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npx --yes @loopdog/cli@${{ inputs.loopdog-version }} controller event \
            --event-name "${{ github.event_name }}" \
            --event-path "$GITHUB_EVENT_PATH" \
            --repo "${{ github.repository }}"
