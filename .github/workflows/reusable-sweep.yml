# Looper's reusable SWEEP workflow (task 0076) — the resilience backstop.
# Recovers webhook-missed items, carries GITHUB_TOKEN controller→controller
# handoffs (why no looper GitHub App is needed), and drives time-based
# transitions (lease reclaim, cron-due loops, hold retries).
name: looper-reusable-sweep
on:
  workflow_call:
    inputs:
      looper-version:
        description: '@loopdog/cli version to run'
        type: string
        default: latest

# Least-privilege manifest (task 0029). NOT granted: actions, packages,
# deployments, id-token, security-events. Deploy/OIDC loops opt in per-workflow.
permissions:
  contents: write # plan store + telemetry writes via the contents API
  issues: write # labels = state, claims, comments
  pull-requests: write # ingest/label/comment on PRs
  checks: read # CI verdicts for the gates

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: run looper controller (sweep)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npx --yes @loopdog/cli@${{ inputs.looper-version }} controller sweep \
            --repo "${{ github.repository }}"
