# Loopdog's reusable SWEEP workflow (task 0076) — the resilience backstop.
# Recovers webhook-missed items, carries GITHUB_TOKEN controller→controller
# handoffs (why no loopdog GitHub App is needed), and drives time-based
# transitions (lease reclaim, cron-due loops, hold retries). With the optional
# `loopdog_pat` secret set, sweep-made transitions also re-trigger event
# workflows, so a swept item chains onward instantly rather than waiting for the
# next cron tick.
name: loopdog-reusable-sweep
on:
  workflow_call:
    inputs:
      loopdog-version:
        description: '@loopdog/cli version to run'
        type: string
        default: latest
    # Provider dispatch secrets, forwarded by the thin caller. All optional —
    # the sweep still runs (reclaim leases, advance deterministic loops) without
    # them; only model-dispatching loops in `act` mode require them.
    secrets:
      claude_fire_url:
        description: 'LOOPDOG_CLAUDE_FIRE_URL — Claude routine /fire URL'
        required: false
      claude_fire_token:
        description: 'LOOPDOG_CLAUDE_FIRE_TOKEN — Claude routine bearer token'
        required: false
      codex_mention_token:
        description: 'LOOPDOG_CODEX_MENTION_TOKEN — token that posts @codex mentions'
        required: false
      loopdog_pat:
        description: >-
          LOOPDOG_PAT — optional fine-grained PAT (issues/PR/contents: write).
          When set, transitions the sweep makes re-trigger event workflows so
          swept items chain on instantly. Unset → GITHUB_TOKEN (today's behavior).
        required: false

# Least-privilege manifest (task 0029). NOT granted: actions, packages,
# deployments, id-token, security-events. Deploy/OIDC loops opt in per-workflow.
permissions:
  contents: write # plan store + telemetry writes via the contents API
  issues: write # labels = state, claims, comments
  pull-requests: write # ingest/label/comment on PRs
  checks: read # CI verdicts for the gates

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: run loopdog controller (sweep)
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Optional PAT: when non-empty the controller acts as it (instant
          # handoff); empty falls through to GITHUB_TOKEN (sweep-carried).
          LOOPDOG_PAT: ${{ secrets.loopdog_pat }}
          # Provider auth for `act`-mode dispatch — empty when not connected.
          LOOPDOG_CLAUDE_FIRE_URL: ${{ secrets.claude_fire_url }}
          LOOPDOG_CLAUDE_FIRE_TOKEN: ${{ secrets.claude_fire_token }}
          LOOPDOG_CODEX_MENTION_TOKEN: ${{ secrets.codex_mention_token }}
        run: |
          npx --yes @loopdog/cli@${{ inputs.loopdog-version }} controller sweep \
            --repo "${{ github.repository }}"
